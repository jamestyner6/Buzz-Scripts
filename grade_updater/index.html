<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Buzz Admin Tool</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 500px; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        .success { color: green; font-weight: bold; }
        .error { color: red; }
    </style>
</head>
<body>
    <h2>Buzz User Updater</h2>
    
    <div id="loginSection">
        <input type="text" id="domain" placeholder="Domain (e.g. oxford)">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">1. Login to Buzz</button>
    </div>

    <div id="actionSection" style="display:none;">
        <p class="success">Logged in!</p>
        <input type="text" id="targetUserId" placeholder="Target User ID (e.g. 218319894)">
        <input type="text" id="newGrade" placeholder="New Grade Level (e.g. 10)">
        <button onclick="updateGrade()">2. Update Grade Level</button>
    </div>

    <div id="status"></div>

    <script>
        let sessionToken = "";

        async function login() {
            const domain = document.getElementById('domain').value;
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const response = await fetch(`https://api.agilixbuzz.com/cmd/login?username=${domain}/${user}&password=${pass}&format=json`);
            const data = await response.json();

            if (data.response.code === "OK") {
                sessionToken = data.response.user.token;
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('actionSection').style.display = 'block';
            } else {
                alert("Login Failed: " + data.response.message);
            }
        }

        async function updateGrade() {
            const userId = document.getElementById('targetUserId').value;
            const grade = document.getElementById('newGrade').value;
            const statusDiv = document.getElementById('status');

        const payload = {
  "requests": {
    "user": [
      {
        "userid": userId,
        "data": {
          "meta-Grade_Level": {
            "$value": grade
          }
        }
      }
    ]
  }
};

            const response = await fetch(`https://api.agilixbuzz.com/cmd/updateusers?_token=${sessionToken}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            if (result.response.responses.response[0].code === "OK") {
                statusDiv.innerHTML = `<p class="success">Successfully updated User ${userId} to Grade ${grade}!</p>`;
            } else {
                statusDiv.innerHTML = `<p class="error">Error: ${result.response.responses.response[0].message}</p>`;
            }
        }
    </script>
</body>
</html>
